<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Alfred{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/alfred-logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="ops-header">
    <nav class="container-fluid">
      <ul>
        <li>
          <a class="brand" href="/" aria-label="Alfred home">
            <img src="/static/alfred-logo.png" alt="" />
            <strong>Alfred</strong>
          </a>
        </li>
      </ul>
      <ul>
        <li><a href="/">Fleet</a></li>
        <li><a href="/firings">Firings</a></li>
      </ul>
    </nav>
  </header>
  <main class="container ops-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="ops-footer">
    <small>Alfred local cockpit</small>
  </footer>
</body>
</html>
