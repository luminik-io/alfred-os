<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}alfred serve{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="ops-header">
    <nav class="container-fluid">
      <ul>
        <li><strong class="brand">alfred serve</strong></li>
      </ul>
      <ul>
        <li><a href="/">fleet</a></li>
        <li><a href="/firings">firings</a></li>
      </ul>
    </nav>
  </header>
  <main class="container ops-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="ops-footer">
    <small>read-only · localhost · $ALFRED_HOME/state</small>
  </footer>
</body>
</html>
