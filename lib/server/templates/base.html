<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Alfred{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/alfred-logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/style.css?v=20260528-command-center-5" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="ops-header">
    <nav class="container-fluid ops-nav">
      <a class="brand" href="/" aria-label="Alfred home">
        <img src="/static/alfred-logo.png" alt="" />
        <strong>Alfred</strong>
      </a>
      <div class="view-tabs" aria-label="Primary views">
        <a class="{{ 'is-active' if request.url.path == '/' else '' }}" href="/" {% if request.url.path == '/' %}aria-current="page"{% endif %}>Fleet</a>
        <a class="{{ 'is-active' if request.url.path.startswith('/firings') else '' }}" href="/firings" {% if request.url.path.startswith('/firings') %}aria-current="page"{% endif %}>Firings</a>
        <a class="{{ 'is-active' if request.url.path.startswith('/plans') else '' }}" href="/plans" {% if request.url.path.startswith('/plans') %}aria-current="page"{% endif %}>Plans</a>
        <a class="{{ 'is-active' if request.url.path.startswith('/planning') else '' }}" href="/planning" {% if request.url.path.startswith('/planning') %}aria-current="page"{% endif %}>Planning</a>
      </div>
    </nav>
  </header>
  <main class="container ops-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="ops-footer">
    <small>Alfred command center</small>
  </footer>
  <script>
    (() => {
      const markExternalLinks = (root = document) => {
        root.querySelectorAll('a[href^="http://"], a[href^="https://"]').forEach((link) => {
          try {
            const url = new URL(link.href, window.location.href);
            if (url.origin === window.location.origin) return;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
          } catch {
            // Ignore malformed operator-provided URLs in local state.
          }
        });
      };

      document.addEventListener("DOMContentLoaded", () => markExternalLinks());
      document.body.addEventListener("htmx:afterSwap", (event) => {
        markExternalLinks(event.target);
      });
    })();
  </script>
</body>
</html>
