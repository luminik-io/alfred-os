{% extends "base.html" %}
{% block title %}Not found · Alfred{% endblock %}
{% block content %}
<section>
  <hgroup>
    <h2>{{ title or "Item not found" }}</h2>
    <p><code>{{ item_id or firing_id }}</code> was not located in local Alfred state.</p>
  </hgroup>
  <p><a href="{{ back_url or '/firings' }}">{{ back_label or "back to firings" }}</a></p>
</section>
{% endblock %}
