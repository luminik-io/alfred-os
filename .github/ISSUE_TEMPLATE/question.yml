name: Question
description: Ask about alfred-os (when the docs don't answer it)
title: "[question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome. Before opening a question issue, check:

        - [`INSTALL.md`](https://github.com/luminik-io/alfred-os/blob/main/INSTALL.md) — fresh-machine setup
        - [`docs/TUTORIAL.md`](https://github.com/luminik-io/alfred-os/blob/main/docs/TUTORIAL.md) — your-first-agent walkthrough
        - [`docs/STATE_MACHINE.md`](https://github.com/luminik-io/alfred-os/blob/main/docs/STATE_MACHINE.md) — claim/release semantics
        - [`docs/SLACK_SETUP.md`](https://github.com/luminik-io/alfred-os/blob/main/docs/SLACK_SETUP.md), [`docs/AWS_SETUP.md`](https://github.com/luminik-io/alfred-os/blob/main/docs/AWS_SETUP.md), [`docs/CLAUDE_CODE.md`](https://github.com/luminik-io/alfred-os/blob/main/docs/CLAUDE_CODE.md)
        - [`SUPPORT.md`](https://github.com/luminik-io/alfred-os/blob/main/SUPPORT.md) — what's in scope

        If the answer's already there, the doc gets a star, not a new issue.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be specific. "How do I X?" with context about what you've tried.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        What you're trying to build, what you've tried, what you read in the docs.
        The framework's design is opinionated — context helps us point you at the right tradeoff.
    validations:
      required: false
