name: gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so pull_request scans every commit on the branch,
          # not just the merge diff.
          fetch-depth: 0
      # The gitleaks GitHub Action requires a paid license for GitHub
      # Organizations. The gitleaks BINARY is free (MIT), so we run it directly.
      - name: Run gitleaks (binary; no org license required)
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
          gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1
