name: Site

on:
  schedule:
    - cron: "17 6 * * *"
  push:
    branches: [main]
    paths:
      - "lib/server/static/**"
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    branches: [main]
    paths:
      - "lib/server/static/**"
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Refresh public impact proof
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Deploy-time refresh only. The committed JSON is a seed for local builds
        # and PR previews; the main-branch site build reads this fresh file.
        run: npm run proof:update

      - name: Refresh Luminik product proof
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && vars.ALFRED_PRODUCT_PROOF_REPOS != ''
        working-directory: site
        env:
          ALFRED_PRODUCT_PROOF_REPOS: ${{ vars.ALFRED_PRODUCT_PROOF_REPOS }}
          ALFRED_PRODUCT_PROOF_DAYS: ${{ vars.ALFRED_PRODUCT_PROOF_DAYS || '30' }}
          ALFRED_PRODUCT_PROOF_LABEL: ${{ vars.ALFRED_PRODUCT_PROOF_LABEL || 'Luminik product setup' }}
          GH_TOKEN: ${{ secrets.ALFRED_PRODUCT_PROOF_TOKEN }}
        # Private/product proof is aggregate-only. The repo list and token stay
        # in Actions config; the generated JSON contains counts, not repo names.
        run: npm run proof:product

      - name: Build site
        working-directory: site
        env:
          ALFRED_OS_SITE_URL: ${{ vars.ALFRED_OS_SITE_URL || 'https://alfred.luminik.io' }}
          ALFRED_OS_SITE_BASE: ${{ vars.ALFRED_OS_SITE_BASE || '/' }}
          PUBLIC_ALFRED_TELEMETRY_STATS_URL: ${{ vars.PUBLIC_ALFRED_TELEMETRY_STATS_URL || '' }}
        run: npm run build

      # Publishing is gated so forks and private prep branches can build docs
      # without deploying. Set ALFRED_OS_PUBLISH_PAGES=true for public releases.
      - name: Upload Pages artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' && vars.ALFRED_OS_PUBLISH_PAGES == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' && vars.ALFRED_OS_PUBLISH_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
