name: Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        env:
          ALFRED_OS_SITE_URL: ${{ vars.ALFRED_OS_SITE_URL || 'https://luminik-io.github.io' }}
          ALFRED_OS_SITE_BASE: ${{ vars.ALFRED_OS_SITE_BASE || '/alfred-os' }}
        run: npm run build

      # Keep Pages publishing disabled while alfred-os is still private launch prep.
      # Set repo variable ALFRED_OS_PUBLISH_PAGES=true when the site is ready to publish.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ALFRED_OS_PUBLISH_PAGES == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ALFRED_OS_PUBLISH_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
