name: scrub-history

# Scheduled full git-HISTORY scrub. The PR-blocking scrub-check job in ci.yml
# only sees the current checkout; this catches private paths or secrets that
# were committed in the PAST. It runs on a cron (and on demand) and is
# deliberately NOT wired to pull_request / push, so it never blocks a PR.
on:
  schedule:
    # 06:17 UTC every Monday.
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: scrub-history
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  history-scan:
    name: Full git-history cleanliness scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so --history can pickaxe every commit, not just HEAD.
          fetch-depth: 0
      - name: Scan git history for known-private patterns
        run: bash bin/scrub-check.sh --history
