name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: ruff check
        run: uv run --with 'ruff>=0.6' ruff check .
      - name: ruff format check
        run: uv run --with 'ruff>=0.6' ruff format --check .
      - name: mypy
        run: uv run --with 'mypy>=1.10' mypy lib/

  test-python:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --python ${{ matrix.python }} --with pytest pytest tests/ -v

  shellcheck:
    name: shellcheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Find shell scripts
        id: find
        run: |
          {
            echo "files<<EOF"
            find . -type f \
              \( -name "*.sh" -o -name "*.bash" \) \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*"
            # Also any executable shell-shebang files
            find . -type f -perm -u+x \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*" \
              -exec sh -c 'head -1 "$1" | grep -qE "^#!.*\b(bash|sh)\b"' _ {} \;
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        if: steps.find.outputs.files != ''
        run: |
          # shellcheck disable=SC2086
          echo "${{ steps.find.outputs.files }}" | sort -u | while read -r f; do
            [ -z "$f" ] && continue
            echo "==> $f"
            shellcheck -S warning "$f" || exit 1
          done

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Compile every Python file
        run: |
          find . -name "*.py" \
            ! -path "./site/node_modules/*" \
            ! -path "./.git/*" \
            -print0 | xargs -0 -n1 python -m py_compile

  scrub-check:
    name: Alfred-OS cleanliness scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Refuse known-private patterns
        run: bash bin/scrub-check.sh
