name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify VERSION matches tag
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version_in_file="$(cat VERSION | tr -d '[:space:]')"
          tag_no_v="${tag#v}"
          if [ "$tag_no_v" != "$version_in_file" ]; then
            echo "::error::Tag $tag does not match VERSION file ($version_in_file)"
            exit 1
          fi

      - name: Extract changelog notes for this version
        id: notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          tag_no_v="${tag#v}"
          repo="${{ github.repository }}"
          # The published release body leads with just the version's
          # "### Highlights" subsection (the short, human-facing summary), not
          # the full Added/Changed/Fixed lists. Walk into the "## [<version>]"
          # section, then capture from its "### Highlights" heading up to the
          # next "###" heading. A "Full changelog" pointer to CHANGELOG.md at
          # this tag is appended so readers can reach every entry.
          # Capture the Highlights body, then strip leading and trailing blank
          # lines so the appended pointer sits exactly one blank line below it.
          awk -v ver="$tag_no_v" '
            $0 ~ "^## \\[" ver "\\]([[:space:]]|$)" { in_ver=1; next }
            in_ver && /^## \[/ { exit }
            in_ver && /^### [Hh]ighlights[[:space:]]*$/ { in_hl=1; next }
            in_hl && /^### / { exit }
            in_hl {
              if (NF == 0) { if (started) blanks++; next }
              while (blanks-- > 0) print ""
              blanks = 0
              started = 1
              print
            }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::warning::No Highlights subsection found for $tag; using a stub."
            echo "Release $tag" > /tmp/release-notes.md
          fi
          {
            echo
            echo "Full changelog: [CHANGELOG.md](https://github.com/${repo}/blob/${tag}/CHANGELOG.md)"
          } >> /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create or update DRAFT GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Create the release as a DRAFT. The release body is the changelog
          # Highlights, which claim a signed native desktop download. Those
          # signed .dmg/.AppImage/.deb assets are attached LATER by the internal
          # signed-desktop-release workflow run against this tag. Keeping the
          # release a draft means the download claim is never public until a
          # human has attached the signed assets and pressed Publish. Do NOT add
          # --latest here: --latest publishes, which defeats the draft gate.
          #
          # On the EDIT path we deliberately do NOT pass --draft. A rerun
          # (workflow_dispatch / re-tag) after a human has attached the signed
          # assets and published the release must not re-hide the live release
          # and its assets. Omitting --draft preserves whatever state the
          # release is currently in: a still-unpublished release stays a draft,
          # an already-published release stays published.
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --notes-file "${{ steps.notes.outputs.notes_file }}"
          else
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --notes-file "${{ steps.notes.outputs.notes_file }}" \
              --draft \
              --verify-tag
          fi

      - name: Compute source tarball checksum (for brew formula)
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          tarball_url="https://github.com/${{ github.repository }}/archive/refs/tags/${tag}.tar.gz"
          echo "::notice::Source tarball: $tarball_url"
          curl -fsSL "$tarball_url" -o /tmp/src.tar.gz
          sha256=$(shasum -a 256 /tmp/src.tar.gz | awk '{print $1}')
          echo "::notice::sha256: $sha256"
          echo "Update Formula/alfred-os.rb with this sha256 then push to your tap."
