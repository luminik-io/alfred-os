# Example agents.conf for the alfred-os examples.
#
# Format documented in launchd/agents.conf.example. TSV: label, script,
# schedule, needs_java, optional log_stem, optional role.

# bin/hello.py — the absolute minimum agent. Prints + Slack-posts.
my.fleet.hello	hello.py	interval:3600	no		Hello-world notifier

# bin/echo_summarise.py — the tutorial agent. Pick / claim / claude / act /
# release / report. The shape every richer codename inherits.
# Requires ECHO_REPO_SLUG=<your-org>/<your-repo> in the operator env.
my.fleet.echo	echo_summarise.py	interval:1800	no		Echo issue summarizer
